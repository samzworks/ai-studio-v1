<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <!-- Preconnect to Google Fonts for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts: Outfit (headings), Inter (body), Cairo (Arabic) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- DNS prefetch for common external resources -->
    <link rel="dns-prefetch" href="https://replit.com" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; width: 100%; }
      body {
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        color: #fafafa;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Full-page loading screen overlay */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.3s ease-out;
      }
      
      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-logo {
        position: relative;
        width: 96px;
        height: 96px;
        margin-bottom: 24px;
      }

      .loading-orbit {
        position: absolute;
        inset: 0;
        border-radius: 9999px;
      }

      .orbit-ring {
        position: absolute;
        border-radius: 9999px;
        border: 2px solid transparent;
      }

      .orbit-ring.ring-1 {
        inset: 4px;
        border-top-color: #3b6ef7;
        border-right-color: #3b6ef7;
        animation: spin-cw 2.4s linear infinite;
      }

      .orbit-ring.ring-2 {
        inset: 16px;
        border-bottom-color: #1F56F5;
        border-left-color: #1F56F5;
        animation: spin-ccw 1.7s linear infinite;
      }

      .orbit-dot {
        position: absolute;
        inset: 0;
        animation: orbit-dot 1.8s linear infinite;
      }

      .orbit-dot::before {
        content: "";
        position: absolute;
        left: calc(50% - 4px);
        top: 2px;
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: #1F56F5;
        box-shadow: 0 0 10px rgba(31, 86, 245, 0.9);
      }

      .orbit-core {
        position: absolute;
        inset: 30px;
        border-radius: 9999px;
        display: grid;
        place-items: center;
        font-size: 20px;
        font-weight: 700;
        color: #ecfeff;
        background: radial-gradient(circle at 30% 30%, #8fb0ff, #3b6ef7 60%, #1F56F5 100%);
        box-shadow: 0 0 24px rgba(31, 86, 245, 0.45);
      }
      
      .loading-text {
        color: rgba(255, 255, 255, 0.8);
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.5px;
        animation: text-fade 1.8s ease-in-out infinite;
      }
      
      .loading-brand {
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 0.08em;
        background: linear-gradient(135deg, #8fb0ff 0%, #3b6ef7 55%, #1F56F5 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 26px;
        text-shadow: 0 0 14px rgba(31, 86, 245, 0.25);
      }
      
      @keyframes spin-cw {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes spin-ccw {
        from { transform: rotate(360deg); }
        to { transform: rotate(0deg); }
      }

      @keyframes orbit-dot {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes text-fade {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 1; }
      }
      
      @media (prefers-reduced-motion: reduce) {
        .orbit-ring.ring-1,
        .orbit-ring.ring-2,
        .orbit-dot,
        .loading-text { animation: none; }
        #loading-screen { transition: none; }
      }
    </style>
  </head>
  <body>
    <!-- Full-page loading screen - removed by JavaScript when app is ready -->
    <div id="loading-screen">
      <div class="loading-logo" aria-hidden="true">
        <div class="loading-orbit">
          <span class="orbit-ring ring-1"></span>
          <span class="orbit-ring ring-2"></span>
          <span class="orbit-dot"></span>
          <span class="orbit-core">T</span>
        </div>
      </div>
      <div class="loading-brand">Tkoeen</div>
      <div class="loading-text">Loading Tkoeen...</div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
